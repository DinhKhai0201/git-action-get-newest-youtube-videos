name: Auto Scrape Outages Data
on:
  push:
    branches:
      - master
  schedule:
    # 6h sáng Việt Nam (UTC+7) -> 23h UTC
    - cron: '0 23 * * *'
    # 23h tối Việt Nam (UTC+7) -> 16h UTC
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scrape API
        run: |
          # Gọi đến endpoint GET /api/scrape
          curl -v -X GET "${{ secrets.LCD_APP_URL }}/api/scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_LCD_API_KEY }}" \
            -H "Content-Type: application/json"
        env:
          APP_URL: ${{ secrets.LCD_APP_URL }}
          CRON_API_KEY: ${{ secrets.CRON_LCD_API_KEY }}
